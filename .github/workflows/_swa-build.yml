name: Build Job (Reusable)

on:
  workflow_call:
    inputs:
      supabase_url:
        required: true
        type: string
    secrets:
      supabase_key:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          lfs: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.25.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check code formatting
        run: pnpm format:check

      - name: Lint code
        run: pnpm lint

      - name: Inject environment variables
        run: envsubst < src/env/environment.ts > src/env/environment.tmp && mv src/env/environment.tmp src/env/environment.ts
        env:
          SUPABASE_URL: ${{ inputs.supabase_url }}
          SUPABASE_KEY: ${{ secrets.supabase_key }}

      - name: Build application
        run: pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-app-artifacts
          path: dist/etn-semaine/browser
          retention-days: 1
