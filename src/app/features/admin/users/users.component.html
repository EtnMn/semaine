<h1 class="mb-6 text-xl font-bold">Manage users</h1>

<p-toast />
<p-confirmdialog />
<p-dataview
  #dv
  [value]="users()"
  [rows]="pageSize"
  [paginator]="true"
  [totalRecords]="totalCount()"
  [lazy]="true"
  [alwaysShowPaginator]="false"
  (onPage)="loadPage($event.first)"
>
  <ng-template #header>
    <div class="flex justify-end">
      <p-button size="small">Invite user</p-button>
    </div>
  </ng-template>

  <ng-template #emptymessage> </ng-template>

  <ng-template #list let-users>
    <div class="flex flex-col gap-4 py-8">
      @if (loading()) {
        @for (_ of [1, 2, 3]; track $index; let last = $last) {
          <div class="flex px-4">
            <app-user-info [loading]="loading()" />
          </div>
          @if (!last) {
            <p-divider />
          }
        }
      } @else {
        @for (user of users; track user.id; let last = $last) {
          <div class="flex gap-2 px-4">
            <div class="flex min-w-0 flex-1">
              <app-user-info
                [name]="user.name"
                [email]="user.email"
                [avatarUrl]="user.avatar_url"
              />
            </div>
            <div class="flex items-center">
              <p-button
                label="Delete"
                size="small"
                variant="outlined"
                severity="danger"
                [disabled]="user.id === me()?.id"
                (click)="onDeleteUser(user)"
              />
            </div>
          </div>
          @if (!last) {
            <p-divider />
          }
        }
      }
    </div>
  </ng-template>
</p-dataview>
