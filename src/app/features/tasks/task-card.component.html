<p-card
  class="cursor-pointer"
  [style]="{ height: '100%', display: 'flex' }"
  [pt]="{
    body: { style: { flex: '1', display: 'flex' } },
    content: { style: { flex: '1' } },
  }"
  [class.opacity-75]="!task().started"
  [class.grayscale]="!task().started"
  (click)="onEditTask()"
>
  <ng-template #header>
    <div class="flex items-center gap-3 border-b border-gray-200 px-4 py-3 dark:border-gray-700">
      <div
        class="flex h-9 w-9 shrink-0 items-center justify-center rounded-lg"
        [class]="difficultyBgClass(task().difficulty)"
      >
        <i class="text-sm text-white" [class]="difficultyIcon(task().difficulty)"></i>
      </div>
      <h3
        class="min-w-0 flex-1 truncate font-semibold text-gray-900 transition dark:text-white"
        [class]="{ 'line-through': !task().started, 'group-hover:no-underline': !task().started }"
      >
        {{ task().name }}
      </h3>
      <p-menu #menu [model]="items" [popup]="true" appendTo="body" />
      <p-button
        variant="outlined"
        severity="secondary"
        (click)="menu.toggle($event); $event.stopPropagation()"
        icon="pi pi-ellipsis-h"
        class="p-button-rounded p-button-sm"
      />
    </div>
  </ng-template>
  <p-confirmdialog />
  <p
    class="grow text-sm leading-relaxed text-gray-600 dark:text-gray-300"
    [class]="{ 'line-through': !task().started, 'group-hover:no-underline': !task().started }"
  >
    {{ task().description }}
  </p>
  @if (task().tags.length) {
    <div class="mt-3 flex flex-wrap gap-1.5">
      @for (tag of task().tags; track tag) {
        <span
          class="rounded-full bg-white px-2.5 py-0.5 text-xs text-gray-600 ring-1 ring-gray-200 dark:bg-gray-700 dark:text-gray-300 dark:ring-gray-600"
        >
          {{ tag }}
        </span>
      }
    </div>
  }
  <ng-template #footer>
    <div
      class="-mx-5 mt-1 -mb-5 border-t border-gray-200 bg-gray-100 px-5 py-2.5 dark:border-gray-700 dark:bg-gray-900"
    >
      <div class="flex items-center gap-3 text-xs text-gray-500 dark:text-gray-400">
        <span class="flex items-center gap-1">
          <i class="pi pi-refresh"></i>
          {{ task().periodicity | titlecase }}
        </span>
        @if (task().duration) {
          <span class="flex items-center gap-1">
            <i class="pi pi-clock"></i>
            {{ task().duration }} min
          </span>
        }
      </div>
    </div>
  </ng-template>
</p-card>
