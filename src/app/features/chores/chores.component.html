<p-toast />

@if (chores().length === 0) {
  <p class="text-gray-600">No chores scheduled.</p>
} @else {
  <div class="space-y-4">
    @for (chore of chores(); track chore.id) {
      <div class="rounded-lg border bg-white p-4 shadow-sm">
        <div class="flex items-start justify-between">
          <div>
            <h2 class="text-lg font-semibold">{{ chore.task.name }}</h2>
            <p class="mt-1 text-sm text-gray-600">{{ chore.task.description }}</p>
            <div class="mt-3 flex gap-4 text-sm">
              <span class="text-gray-700">
                <strong>Duration:</strong> {{ chore.task.duration }} min
              </span>
              <span class="text-gray-700">
                <strong>Difficulty:</strong>
                <span class="capitalize">{{ chore.task.difficulty }}</span>
              </span>
            </div>
          </div>
        </div>
      </div>
    }
  </div>
}
