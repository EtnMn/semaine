<header>
  <p-menubar>
    <ng-template #start>
      <div class="flex items-center gap-2">
        <img src="logo.svg" alt="Logo" class="h-10 w-10" />
        <h1 class="text-3xl font-bold">{{ title() }}</h1>
      </div>
    </ng-template>
    <ng-template #end>
      <div class="flex items-center gap-2">
        @if (userName()) {
          <span class="text-sm font-medium">{{ userName() }}</span>
        }
        <p-button
          [icon]="darkMode.icon()"
          (onClick)="toggleDarkMode()"
          severity="secondary"
          outlined
        />
      </div>
    </ng-template>
  </p-menubar>
</header>
