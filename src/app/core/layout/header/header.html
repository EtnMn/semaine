<header>
  <p-menubar>
    <ng-template #start>
      <a routerLink="/" class="flex items-center gap-2 no-underline">
        <img src="logo.svg" alt="Logo" class="h-10 w-10" />
        <h1 class="text-3xl font-bold">{{ title() }}</h1>
      </a>
    </ng-template>
    <ng-template #end>
      <div class="flex items-center gap-2">
        <p-button
          [icon]="darkMode.icon()"
          (onClick)="toggleDarkMode()"
          severity="secondary"
          outlined
        />
        @if (authService.isAuthenticated()) {
          @if (avatarUrl()) {
            <p-button class="flex" styleClass="!p-1" (onClick)="menu.toggle($event)" text>
              <p-avatar [image]="avatarUrl()" shape="circle" />
            </p-button>
          } @else {
            <p-button
              icon="pi pi-user"
              severity="secondary"
              outlined
              (onClick)="menu.toggle($event)"
            />
          }
          <p-menu #menu [model]="items()" [popup]="true" appendTo="body" styleClass="max-w-lg">
            <ng-template class="flex w-full" #start>
              <app-user-info
                class="p-2 pl-4"
                [name]="userName()"
                [email]="userEmail()"
                [avatarUrl]="avatarUrl()"
              />
            </ng-template>
          </p-menu>
        }
      </div>
    </ng-template>
  </p-menubar>
</header>
